<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" role="img" aria-labelledby="title desc">
  <title id="title">Open Design import workflow</title>
  <desc id="desc">Clone the repository, pick one theme folder, import it as a local project in Open Design, then generate Oracle APEX prototypes.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font: 700 28px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #161513; }
      .step-title { font: 700 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #161513; }
      .step-body { font: 500 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #5f6368; }
      .mono { font: 600 12px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #00688c; }
      .num { font: 800 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #ffffff; }
    </style>
  </defs>
  <rect width="1200" height="320" fill="#f7f8fa"/>
  <text class="title" x="60" y="56">Open Design import workflow</text>

  <g transform="translate(60 100)" filter="url(#shadow)">
    <rect width="220" height="135" rx="14" fill="#ffffff"/>
    <circle cx="34" cy="34" r="16" fill="#302d2a"/>
    <text class="num" x="28" y="41">1</text>
    <text class="step-title" x="24" y="72">Clone repository</text>
    <text class="step-body" x="24" y="96">Get the source-backed</text>
    <text class="step-body" x="24" y="114">theme folders locally.</text>
  </g>

  <path d="M300 168 H378" stroke="#9ca3af" stroke-width="2" fill="none"/>
  <path d="M378 168 l-10 -7 v14 z" fill="#9ca3af"/>

  <g transform="translate(395 100)" filter="url(#shadow)">
    <rect width="220" height="135" rx="14" fill="#ffffff"/>
    <circle cx="34" cy="34" r="16" fill="#00688c"/>
    <text class="num" x="28" y="41">2</text>
    <text class="step-title" x="24" y="72">Pick one theme</text>
    <text class="mono" x="24" y="97">Iris/</text>
    <text class="mono" x="24" y="116">Redwood-Light/</text>
    <text class="mono" x="128" y="116">Vita/</text>
  </g>

  <path d="M635 168 H713" stroke="#9ca3af" stroke-width="2" fill="none"/>
  <path d="M713 168 l-10 -7 v14 z" fill="#9ca3af"/>

  <g transform="translate(730 100)" filter="url(#shadow)">
    <rect width="220" height="135" rx="14" fill="#ffffff"/>
    <circle cx="34" cy="34" r="16" fill="#5f7d4f"/>
    <text class="num" x="28" y="41">3</text>
    <text class="step-title" x="24" y="72">Import locally</text>
    <text class="step-body" x="24" y="96">Settings -> Design Systems</text>
    <text class="step-body" x="24" y="114">Add design system</text>
  </g>

  <path d="M970 168 H1048" stroke="#9ca3af" stroke-width="2" fill="none"/>
  <path d="M1048 168 l-10 -7 v14 z" fill="#9ca3af"/>

  <g transform="translate(1065 100)" filter="url(#shadow)">
    <rect width="95" height="135" rx="14" fill="#ffffff"/>
    <circle cx="34" cy="34" r="16" fill="#056ac8"/>
    <text class="num" x="28" y="41">4</text>
    <text class="step-title" x="20" y="72">Generate</text>
    <text class="step-body" x="20" y="96">APEX</text>
    <text class="step-body" x="20" y="114">prototype</text>
  </g>

  <text class="step-body" x="60" y="278">Use one theme per prototype. The imported DESIGN.md keeps the Oracle APEX component vocabulary and theme-specific visual rules available to Open Design.</text>
</svg>
