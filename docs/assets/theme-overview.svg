<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Oracle APEX Universal Theme design systems overview</title>
  <desc id="desc">Three independent theme cards for Iris, Redwood Light, and Vita, each showing a compact Oracle APEX style application shell.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.14"/>
    </filter>
    <style>
      .bg { fill: #f7f8fa; }
      .title { font: 700 30px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #161513; }
      .sub { font: 400 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #5f6368; }
      .card-title { font: 700 20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #161513; }
      .card-sub { font: 500 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #5f6368; letter-spacing: 0.04em; }
      .label { font: 600 11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #ffffff; }
      .tiny { font: 500 10px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6b7280; }
      .caption { font: 500 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #374151; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="520" rx="0"/>
  <text class="title" x="60" y="62">Oracle APEX Universal Theme Design Systems</text>
  <text class="sub" x="60" y="91">Source-backed DESIGN.md files for three separate theme styles. Import one theme at a time.</text>

  <!-- Iris -->
  <g transform="translate(60 135)" filter="url(#shadow)">
    <rect width="330" height="285" rx="16" fill="#ffffff"/>
    <rect x="24" y="28" width="282" height="170" rx="8" fill="#fbf9f8" stroke="#e5e1dc"/>
    <rect x="24" y="28" width="282" height="24" rx="8" fill="#302d2a"/>
    <rect x="24" y="48" width="282" height="4" fill="#302d2a"/>
    <rect x="24" y="52" width="64" height="146" fill="#302d2a"/>
    <rect x="36" y="70" width="38" height="5" rx="2.5" fill="#ffffff" opacity="0.75"/>
    <rect x="36" y="91" width="38" height="5" rx="2.5" fill="#ffffff" opacity="0.45"/>
    <rect x="36" y="112" width="38" height="5" rx="2.5" fill="#ffffff" opacity="0.45"/>
    <rect x="98" y="64" width="196" height="34" rx="0" fill="#f1efed"/>
    <rect x="112" y="78" width="74" height="6" rx="3" fill="#161513" opacity="0.65"/>
    <rect x="108" y="114" width="172" height="54" rx="5" fill="#ffffff" stroke="#e5e7eb"/>
    <rect x="122" y="130" width="60" height="7" rx="3.5" fill="#00688c"/>
    <rect x="122" y="147" width="124" height="5" rx="2.5" fill="#d1d5db"/>
    <rect x="254" y="129" width="16" height="16" rx="8" fill="#00688c"/>
    <text class="card-title" x="24" y="232">Iris</text>
    <text class="card-sub" x="24" y="254">DEEP NEUTRAL SHELL</text>
    <rect x="250" y="224" width="56" height="22" rx="11" fill="#00688c"/>
    <text class="label" x="268" y="239">teal</text>
  </g>

  <!-- Redwood Light -->
  <g transform="translate(435 135)" filter="url(#shadow)">
    <rect width="330" height="285" rx="16" fill="#ffffff"/>
    <rect x="24" y="28" width="282" height="170" rx="8" fill="#f7f6f4" stroke="#e7e5e2"/>
    <rect x="24" y="28" width="282" height="24" rx="8" fill="#ffffff"/>
    <rect x="24" y="48" width="282" height="4" fill="#ffffff"/>
    <rect x="24" y="52" width="64" height="146" fill="#f7f6f4"/>
    <rect x="34" y="72" width="44" height="15" rx="4" fill="#e7e5e2"/>
    <rect x="36" y="98" width="38" height="5" rx="2.5" fill="#312d2a" opacity="0.55"/>
    <rect x="36" y="119" width="38" height="5" rx="2.5" fill="#312d2a" opacity="0.35"/>
    <rect x="98" y="64" width="196" height="34" rx="0" fill="#ffffff"/>
    <rect x="98" y="98" width="196" height="6" fill="#6f7d7b"/>
    <rect x="120" y="98" width="28" height="6" fill="#d63b25"/>
    <rect x="181" y="98" width="34" height="6" fill="#bb9c78"/>
    <rect x="108" y="116" width="172" height="54" rx="6" fill="#ffffff" stroke="#e7e5e2"/>
    <rect x="122" y="131" width="60" height="7" rx="3.5" fill="#00688c"/>
    <rect x="122" y="148" width="124" height="5" rx="2.5" fill="#d1d5db"/>
    <rect x="254" y="129" width="18" height="18" rx="4" fill="#6f7d7b"/>
    <text class="card-title" x="24" y="232">Redwood Light</text>
    <text class="card-sub" x="24" y="254">WARM GRAY SHELL</text>
    <rect x="238" y="224" width="68" height="22" rx="11" fill="#5f7d4f"/>
    <text class="label" x="255" y="239">sage</text>
  </g>

  <!-- Vita -->
  <g transform="translate(810 135)" filter="url(#shadow)">
    <rect width="330" height="285" rx="16" fill="#ffffff"/>
    <rect x="24" y="28" width="282" height="170" rx="8" fill="#ffffff" stroke="#e6e6e6"/>
    <rect x="24" y="28" width="282" height="24" rx="8" fill="#056ac8"/>
    <rect x="24" y="48" width="282" height="4" fill="#056ac8"/>
    <rect x="24" y="52" width="64" height="146" fill="#056ac8"/>
    <rect x="36" y="70" width="38" height="5" rx="2.5" fill="#ffffff" opacity="0.85"/>
    <rect x="36" y="91" width="38" height="5" rx="2.5" fill="#ffffff" opacity="0.6"/>
    <rect x="36" y="112" width="38" height="5" rx="2.5" fill="#ffffff" opacity="0.45"/>
    <rect x="98" y="64" width="196" height="34" rx="0" fill="#ffffff"/>
    <rect x="112" y="78" width="74" height="6" rx="3" fill="#202020" opacity="0.65"/>
    <rect x="108" y="114" width="172" height="54" rx="3" fill="#ffffff" stroke="#e6e6e6"/>
    <rect x="122" y="130" width="60" height="7" rx="3.5" fill="#056ac8"/>
    <rect x="122" y="147" width="124" height="5" rx="2.5" fill="#d1d5db"/>
    <rect x="254" y="129" width="16" height="16" rx="3" fill="#056ac8"/>
    <text class="card-title" x="24" y="232">Vita</text>
    <text class="card-sub" x="24" y="254">BLUE APEX SHELL</text>
    <rect x="250" y="224" width="56" height="22" rx="11" fill="#056ac8"/>
    <text class="label" x="267" y="239">blue</text>
  </g>

  <text class="caption" x="60" y="468">Each card represents a separate DESIGN.md file. Keep theme styles independent when importing or generating prototypes.</text>
</svg>
